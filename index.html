// 실시간 랭킹 로드
async function load(){
    const list = document.getElementById('r-list');
    try {
        const { data, error } = await sb.from('ranking').select('*').order('score',{ascending:false}).limit(5);
        if(!error && data && data.length > 0) {
            list.innerHTML = '<b style="color:var(--p); font-size:0.85rem">🏆 실시간 랭킹</b><br>' + data.map((r,i)=>`<div style="padding:6px 0; border-bottom:1px solid #fbfbfb; display:flex; justify-content:space-between;"><span>${i+1}. ${r.name}</span><span style="font-weight:bold">${r.score}점</span></div>`).join('');
        } else { 
            list.innerHTML = "<p style='text-align:center; color:#ccc; font-size:0.75rem;'>새로운 도전을 기다리고 있습니다!</p>"; 
        }
    } catch(e) { 
        list.innerHTML = "<p style='text-align:center; color:#ccc;'>데이터 업데이트 중...</p>"; 
    }
}

function sel(b,l){document.querySelectorAll('.m-btn button').forEach(x=>x.classList.remove('on'));b.classList.add('on');limit=l;}

function go(){
    nk=document.getElementById('nk').value.trim();
    if(!nk) return alert("닉네임을 입력해주세요.");
    document.getElementById('main').style.display='none';
    document.getElementById('quiz').style.display='block';
    qList = [...pool].sort(()=>Math.random()-0.5).slice(0, limit);
    cur=0; hitCount=0; showQ();
}

function showQ(){
    if(cur>=qList.length) { finish(); return; }
    document.getElementById('p-bar').style.width = ((cur/qList.length)*100) + "%";
    document.getElementById('q-txt').innerText = qList[cur].q;
    document.getElementById('ans').innerHTML = qList[cur].a.sort(()=>Math.random()-0.5).map(v=>`<button class="ans-btn" onclick="nxt(${v.h})">${v.t}</button>`).join('');
}

function nxt(h){ hitCount+=h; cur++; showQ(); }

async function finish(){
    const score = Math.round((hitCount / qList.length) * 100);
    document.getElementById('res-ui').style.display = 'block';
    
    try {
        const { error } = await sb.from('ranking').insert([{ name: nk, score: score, level: 'Active' }]);
        if(error) {
            msg("분석 완료!", `${nk}님의 점수는 ${score}점입니다!\n지금 이 결과를 캡처해서 친구들과 공유해보세요!`);
        } else {
            msg("랭킹 등록 완료!", `${nk}님의 점수는 ${score}점입니다!\n명예의 전당에 실시간으로 반영되었습니다!`);
            confetti({particleCount:120, spread:70, origin:{y:0.6}});
        }
    } catch(e) {
        msg("분석 완료!", `${nk}님의 점수는 ${score}점입니다!\n결과를 캡처하여 오늘의 센스를 기록하세요.`);
    }
}

function cp(){
    const t = document.createElement("textarea");
    document.body.appendChild(t);
    t.value = window.location.href;
    t.select();
    document.execCommand('copy');
    document.body.removeChild(t);
    alert("링크가 복사되었습니다! 친구들에게 공유해보세요.");
}

function msg(t, m){ 
    document.getElementById('ntc-t').innerText=t; 
    document.getElementById('ntc-m').innerText=m; 
    document.getElementById('ntc').style.display='flex'; 
    isF=true; 
}
function cls(){ document.getElementById('ntc').style.display='none'; if(isF) location.reload(); }
load();
</script>
